name: MiniBench my-bot history

# Walks every resolved MiniBench EXCEPT the current one and, for our own bot,
# reports how many questions it answered plus its accuracy (Tier-1 beat-chance
# and Tier-2 directional/argmax/IQR) per type, one row per MiniBench. Produces
# CSV + XLSX artifacts.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        continue-on-error: true
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Ensure Poetry is available (fallback install)
        run: |
          poetry --version || (
            python -m pip install -U pip &&
            for i in 1 2 3; do
              python -m pip install "poetry==2.2.1" && break || sleep 10;
            done &&
            poetry --version
          )
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 10
          command: poetry install --no-interaction --no-root
        env:
          POETRY_VIRTUALENVS_CREATE: true
          POETRY_VIRTUALENVS_IN_PROJECT: true
          POETRY_INSTALLER_PARALLEL: true
      - name: Run MiniBench my-bot history
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
        run: |
          # pipefail so a CLI crash fails the step instead of being masked by
          # tee's exit code (which previously left the run green with no files).
          set -o pipefail
          poetry run python -m metaculus_bot.minibench_analysis.cli \
            --mode all-except-current \
            --output-dir minibench_reports \
            | tee analysis_summary.md
      - name: Upload report files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minibench-mybot-history-${{ github.run_id }}
          path: minibench_reports/
          if-no-files-found: warn
          retention-days: 180
      - name: Post summary to Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ] || [ ! -f analysis_summary.md ]; then
            echo "No Discord webhook or summary — skipping."
            exit 0
          fi
          body="$(head -c 1900 analysis_summary.md)"
          payload="$(jq -Rs '{content: .}' <<< "$body")"
          curl -sS --fail -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL" || true
