name: Test Bot

on:
  workflow_dispatch:

# Add concurrency group to prevent parallel runs
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false


# Daily job to run the simple forecast bot
jobs:
  forecast_job:
    runs-on: ubuntu-latest # determines the machine that will run the job - keep as is
    steps: # sets up the steps that will be run in order
      # setup repository with all necessary dependencies - keep as is
      - name: Check out repository
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        continue-on-error: true
        with:
          version: 2.2.1
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Ensure Poetry is available (fallback install)
        run: |
          poetry --version || (
            python -m pip install -U pip &&
            for i in 1 2 3; do
              python -m pip install "poetry==2.2.1" && break || sleep 10;
            done &&
            poetry --version
          )
      # Use the lockfile env. To update deps, run `poetry lock` to update lockfile, then `poetry install` to install the lockfile pkgs, and finally push to Github.
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 10
          command: poetry install --no-interaction --no-root
        env:
          POETRY_VIRTUALENVS_CREATE: true
          POETRY_VIRTUALENVS_IN_PROJECT: true
          POETRY_INSTALLER_PARALLEL: true
      - name: Run bot
        run: |
          poetry run python main.py --mode test_questions
        # this reads the environment variables from the github repository.
        # Store under Settings --> Secrets and variables --> Actions
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }} # replace this with the name of the variable under which you stored your own Metaculus token
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OAI_ANTH_OPENROUTER_KEY: ${{ secrets.OAI_ANTH_OPENROUTER_KEY }}
          # Personal-key fallback OFF: a donated-key (OAI_ANTH_OPENROUTER_KEY)
          # failure must NOT retry on the personal OPENROUTER_API_KEY. 'false' is
          # the code default; pinned here so the no-personal-spend intent is explicit.
          OPENROUTER_PERSONAL_KEY_FALLBACK: 'false'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
          ASKNEWS_MAX_CONCURRENCY: '1'
          ASKNEWS_MAX_RPS: '0.2'
          # Native search runs in parallel with AskNews; model defaults to
          # openai/gpt-5.5 (medium effort, verbosity=low, 360s) per constants.py.
          NATIVE_SEARCH_ENABLED: 'true'
          FINANCIAL_DATA_ENABLED: 'true'
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Gemini grounded search (Google AI Studio SDK) adds a 3rd distinct source.
          # GOOGLE_API_KEY is the operator's personal Google AI Studio key (stored
          # in CI as secrets.GEMINI_API_KEY). The grounded-search side has no
          # donated/shared path — Google AI Studio doesn't offer one.
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_SEARCH_ENABLED: 'true'
          # OpenRouter Gemini routing (the gemini-3.5-flash forecaster + its
          # 3.1-pro throttle fallback). 'true' routes Gemini through the donated
          # OAI_ANTH_OPENROUTER_KEY. With OPENROUTER_PERSONAL_KEY_FALLBACK off,
          # this is safe: a flaky/throttled donated Google route drops the Gemini
          # vote (or switches 3.5-flash -> 3.1-pro, both donated) rather than
          # falling through to the personal key. 'false' would route Gemini's
          # *primary* through the personal OPENROUTER_API_KEY — the spend we're
          # avoiding — so keep 'true' wherever the Gemini forecaster runs.
          GEMINI_USE_DONATED_OPENROUTER_KEY: 'true'
          # Second-pass gap-fill: analyzer identifies gaps in first-pass research,
          # parallel grounded Gemini searches resolve each. Fails soft.
          GAP_FILL_ENABLED: 'true'
          # Prediction-market snapshot provider: Polymarket + Kalshi + Manifold.
          # Manual workflow_dispatch runs use this for end-to-end testing in prod
          # mode (is_benchmarking=False).
          PREDICTION_MARKETS_ENABLED: 'true'
          # Stacking disabled on all types (ablation: stacker <= median on binary,
          # hurts numeric CRPS; stacker base model is a weak binary forecaster).
          NUMERIC_STACKING_ENABLED: 'false'
          BINARY_STACKING_ENABLED: 'false'
          MC_STACKING_ENABLED: 'false'
          OPENAI_AGENTS_DISABLE_TRACING: 'true'
